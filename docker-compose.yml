services:
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: "768m"
      NEO4J_server_memory_heap_max__size: "768m"
      NEO4J_server_memory_pagecache_size: "256m"
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    mem_limit: 1536m

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://bio.arcosdiaz.com}"
    expose:
      - "8000"
    depends_on:
      neo4j:
        condition: service_healthy
    mem_limit: 512m

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 256m

  init-loader:
    build:
      context: .
      dockerfile: Dockerfile.api
    entrypoint: ["/bin/bash", "/app/deploy/init-load.sh"]
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
    volumes:
      - ./reports:/app/reports:ro
      - ./deploy:/app/deploy:ro
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

volumes:
  neo4j_data:
  caddy_data:
  caddy_config:
